apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: telegram-stock-bot
spec:
  ingressClassName: nginx
  rules:
    - host: your-domain.example.com
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: telegram-stock-bot
                port:
                  number: 80

