apiVersion: apps/v1
kind: Deployment
metadata:
  name: telegram-stock-bot
spec:
  replicas: 2
  selector:
    matchLabels:
      app: telegram-stock-bot
  template:
    metadata:
      labels:
        app: telegram-stock-bot
    spec:
      containers:
        - name: app
          image: ghcr.io/your-username/telegram-stock-bot:latest
          ports:
            - containerPort: 8000
          env:
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: stock-bot-secrets
                  key: database-url
            - name: TELEGRAM_BOT_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stock-bot-secrets
                  key: telegram-bot-token
            - name: TELEGRAM_WEBHOOK_SECRET_TOKEN
              valueFrom:
                secretKeyRef:
                  name: stock-bot-secrets
                  key: telegram-webhook-secret-token
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: stock-bot-secrets
                  key: openai-api-key
            - name: PUBLIC_BASE_URL
              value: https://your-domain.example.com
            - name: SET_TELEGRAM_WEBHOOK_ON_STARTUP
              value: "true"
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8000
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8000
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

